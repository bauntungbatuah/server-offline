    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {

        /* Logo Melayang dengan Animasi Halus */
        .logo-floating {
            width: 110px;

            position: relative;
            z-index: 50;

        .glass-card {

            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);

        .vektor-dayak {
            position: absolute;

            right: -20px;

            opacity: 0.15; 
            pointer-events: none;
            z-index: 1;
            filter: invert(1);
        }

        .header-box { 
            position: relative; 
            background: #0f172a; 
            border-top-left-radius: 2.5rem;
            border-top-right-radius: 2.5rem;
            border-bottom: 4px solid #f59e0b;
        }

        .btn-wa {
            background: linear-gradient(45deg, #25D366, #128C7E);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-wa:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>

    <p class="mt-8 text-slate-500 text-[10px] font-bold uppercase tracking-widest">© 2026 Pemerintah Desa Banama</p>

    <script>
        function updateTampilan() {
            const sekarang = new Date();
            const hari = sekarang.getDay();
            const jam = sekarang.getHours();
            const menit = sekarang.getMinutes();
            const waktuSekarang = jam + (menit / 60);

            // Update Jam Digital
            const opsiJam = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('jam-realtime').innerText = sekarang.toLocaleTimeString('id-ID') + " WITA";

            // Logika Jam Kerja (Senin-Kamis: 08:00-15:30, Jumat: 08:00-11:00)
            let isJamKerja = (hari >= 1 && hari <= 4 && waktuSekarang >= 8 && waktuSekarang <= 15.5) || 
                             (hari === 5 && waktuSekarang >= 8 && waktuSekarang <= 11);

            const statusLabel = document.getElementById('status-label');
            const countdownArea = document.getElementById('area-countdown');
            const sapaan = document.getElementById('sapaan');
            const pesan = document.getElementById('pesan-utama');
            
            if (isJamKerja) {
                statusLabel.className = "inline-flex items-center px-5 py-2 rounded-full text-[10px] font-extrabold mb-6 uppercase tracking-[0.15em] bg-red-50 text-red-600 border border-red-100 shadow-sm";
                statusLabel.innerHTML = `<span class="w-2 h-2 bg-red-600 rounded-full mr-2 animate-pulse"></span> Gangguan Teknis`;
                sapaan.innerText = "Mohon Maaf, Pak/Bu";
                pesan.innerText = "Server desa sedang mengalami gangguan koneksi atau dalam proses pemeliharaan sistem. Untuk memastikan apakah gangguan disebabkan oleh jaringan internet kantor atau pemadaman listrik, silakan hubungi Admin Desa melalui WhatsApp.";
                countdownArea.classList.add('hidden');
            } else {
                statusLabel.className = "inline-flex items-center px-5 py-2 rounded-full text-[10px] font-extrabold mb-6 uppercase tracking-[0.15em] bg-amber-50 text-amber-700 border border-amber-100 shadow-sm";
                statusLabel.innerHTML = `<span class="w-2 h-2 bg-amber-500 rounded-full mr-2"></span> Akan Aktif Pada Jam Kerja`;
                sapaan.innerText = "Server Sedang Istirahat";
                pesan.innerText = "Layanan desa saat ini berada di luar jam operasional. Silakan kembali pada jam kerja atau hubungi Admin Desa melalui WhatsApp untuk keperluan mendesak.";
                countdownArea.classList.remove('hidden');
                
                // Hitung Waktu Mundur ke Jam 8 Pagi Besok
                let besok = new Date();
                besok.setHours(8, 0, 0, 0);
                if (sekarang >= besok) besok.setDate(besok.getDate() + 1);
                
                // Lewati Sabtu & Minggu
                while (besok.getDay() === 0 || besok.getDay() === 6) {
                    besok.setDate(besok.getDate() + 1);
                }

                const selisih = besok - sekarang;
                const h = Math.floor(selisih / (1000 * 60 * 60));
                const m = Math.floor((selisih % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((selisih % (1000 * 60)) / 1000);
                document.getElementById('timer').innerText = 
                    `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            document.getElementById('btn-wa').href = `https://wa.me/6285248555550?text=Halo Admin Desa Banama, saya perlu bantuan layanan desa.`;
        }

        setInterval(updateTampilan, 1000);
        updateTampilan();
    </script>
<audio id="bg-music" loop playsinline preload="auto">
    <source src="https://sedangdiluar.netlify.app/audio.mp3" type="audio/mpeg">
</audio>

<script>
    const bgMusic = document.getElementById("bg-music");
    bgMusic.volume = 0.6;

    function aktifkanAudio() {
        // Cek apakah musik sudah bermain, jika belum maka jalankan
        if (bgMusic.paused) {
            bgMusic.play().then(() => {
                console.log("Audio berhasil aktif");
                // Hapus event listener agar tidak berjalan berulang kali
                hapusEvent();
            }).catch(err => {
                console.log("Menunggu interaksi pengguna:", err);
            });
        }
    }

    function hapusEvent() {
        window.removeEventListener("touchend", aktifkanAudio);
        window.removeEventListener("click", aktifkanAudio);
        window.removeEventListener("touchstart", aktifkanAudio);
    }

    // Menambahkan beberapa event untuk mencakup semua skenario (Mobile & Desktop)
    window.addEventListener("touchend", aktifkanAudio);
    window.addEventListener("click", aktifkanAudio);
    window.addEventListener("touchstart", aktifkanAudio); // Tambahan untuk respon lebih cepat di mobile
</script>
    <script>
async function bukaSID(e){
    e.preventDefault();

    const url = "https://desa.banama.my.id";

    try{
        const controller = new AbortController();
        const timeout = setTimeout(()=>controller.abort(),3000);

        await fetch(url,{mode:"no-cors",signal:controller.signal});

        clearTimeout(timeout);

        window.location.href = url;
        return;

    }catch(err){}

    const sekarang = new Date();
    const hari = sekarang.getDay();
    const jam = sekarang.getHours();
    const menit = sekarang.getMinutes();
    const waktu = jam + menit/60;

    const jamKerja =
        (hari>=1 && hari<=4 && waktu>=8 && waktu<=15.5) ||
        (hari==5 && waktu>=8 && waktu<=11);

    if(!jamKerja){
        alert("Layanan desa sedang di luar jam operasional.");
    }else{
        alert("Server desa atau koneksi sedang mengalami gangguan.");
    }
}
</script>
